name: Build

on: 
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ dev ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Build
        run: go build -v ./cmd/mig/...
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mig-binary
          path: mig
